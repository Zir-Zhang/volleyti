<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #E8A500;
    --yellow-light: #FFF8E1;
    --yellow-border: #FFD966;
    --ink: #1A1A1A;
    --ink-2: #444444;
    --ink-3: #888888;
    --white: #FFFFFF;
    --bg: #FAFAF8;
    --serif: 'Noto Serif SC', serif;
    --sans: 'Noto Sans SC', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); }

  body {
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Fade transition */
  .fade-enter { opacity: 0; transform: translateY(12px); }
  .fade-active { opacity: 1; transform: translateY(0); transition: opacity 0.35s ease, transform 0.35s ease; }
  .fade-exit { opacity: 0; transform: translateY(-12px); transition: opacity 0.2s ease, transform 0.2s ease; }

  /* Option button hover/selected states */
  .option-btn {
    display: block; width: 100%; text-align: left;
    background: var(--white);
    border: 1.5px solid #E5E5E0;
    border-radius: 12px;
    padding: 16px 20px;
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .option-btn:hover {
    border-color: var(--yellow);
    background: var(--yellow-light);
    transform: translateX(3px);
  }
  .option-btn.selected {
    border-color: var(--yellow);
    background: var(--yellow-light);
    transform: translateX(3px);
  }
  .option-btn .option-label {
    display: inline-block;
    font-weight: 700;
    font-size: 13px;
    color: var(--yellow);
    margin-right: 10px;
    font-family: var(--serif);
    min-width: 18px;
  }

  /* Progress bar */
  .progress-track {
    height: 3px;
    background: #EBEBEB;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--yellow);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Result card */
  .result-card {
    background: var(--white);
    border: 1.5px solid #E5E5E0;
    border-radius: 20px;
    overflow: hidden;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    box-shadow: 0 2px 24px rgba(0,0,0,0.06);
  }
  .result-header {
    background: var(--ink);
    padding: 32px 28px 28px;
    color: var(--white);
    position: relative;
    overflow: hidden;
  }
  .result-header::after {
    content: '';
    position: absolute;
    bottom: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(232,165,0,0.15);
  }
  .result-header::before {
    content: '';
    position: absolute;
    top: -20px; left: 60%;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(232,165,0,0.08);
  }
  .result-body { padding: 0; }
  .result-section {
    padding: 18px 24px;
    border-bottom: 1px solid #F0F0EC;
  }
  .result-section:last-child { border-bottom: none; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 6px;
  }
  .section-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink-2);
  }

  /* Start / CTA button */
  .cta-btn {
    display: inline-block;
    background: var(--ink);
    color: var(--white);
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 500;
    padding: 14px 40px;
    border-radius: 99px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    letter-spacing: 0.02em;
  }
  .cta-btn:hover { background: #333; transform: scale(1.02); }
  .cta-btn:active { transform: scale(0.98); }

  .restart-btn {
    display: inline-block;
    background: transparent;
    color: var(--ink-3);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 99px;
    border: 1.5px solid #E5E5E0;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 12px;
  }
  .restart-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* Volleyball decoration */
  .vb-deco {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--yellow-light);
    border: 2px solid var(--yellow-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin: 0 auto 24px;
  }

  /* Page layout */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .quiz-container {
    width: 100%;
    max-width: 560px;
  }

  /* Avatar placeholder in result */
  .char-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(232,165,0,0.2);
    border: 2px solid var(--yellow);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin-bottom: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .char-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* Score breakdown */
  .score-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .score-bar-label { font-size: 12px; font-weight: 700; color: var(--yellow); width: 16px; flex-shrink: 0; }
  .score-bar-track { flex: 1; height: 4px; background: #F0F0EC; border-radius: 99px; overflow: hidden; }
  .score-bar-fill { height: 100%; background: var(--yellow); border-radius: 99px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  .score-bar-count { font-size: 11px; color: var(--ink-3); width: 16px; text-align: right; flex-shrink: 0; }

  @media (max-width: 480px) {
    .result-header { padding: 24px 20px 22px; }
    .result-section { padding: 14px 18px; }
    .cta-btn { font-size: 15px; padding: 13px 32px; }
  }
</style>
</head>

/* ─────────────────── SCORING LOGIC ─────────────────── */
function calcResult(counts) {
  const { A, B, C, D } = counts;
  const total = A + B + C + D; // should be 10

  // ① Dominant singles (≥ 7)
  if (A >= 7) return '二次猿';
  if (B >= 7) return '棉花糖';
  if (C >= 7) return '高奢挂件';
  if (D >= 7) return '尖叫鸡';

  // ② A is 4-6, C is secondary majority
  if (A >= 4 && A <= 6 && C > B && C > D) return '下网批发商';

  // ③ B is 4-6, A is secondary majority
  if (B >= 4 && B <= 6 && A > C && A > D) return '网前景观位';

  // ④ C is 4-6, has D or A presence
  if (C >= 4 && C <= 6 && (D >= 2 || A >= 2) && C > D && C > A) return '复读机';

  // ⑤ D is 4-6, C is high (C多)
  if (D >= 4 && D <= 6 && C >= 3 && C > A && C > B) return '地板擦亮师';

  // ⑥ A+C combined high, D very low
  if ((A + C) >= 6 && D <= 2) return '碰瓷王';

  // ⑦ A low, C dominant
  if (A <= 2 && C >= 4 && C >= B) return '老中医';

  // ⑧ D/C mixed派 with B around 4
  if (D >= 3 && C >= 3 && B >= 3 && B <= 5) return '球场独奏者';

  // ⑨ A/B/D roughly balanced, C very low
  const spread = Math.abs(A - B) + Math.abs(B - D) + Math.abs(A - D);
  if (spread <= 4 && C <= 2) return '懂王';

  // ⑩ Default: find highest
  const sorted = [['A', A], ['B', B], ['C', C], ['D', D]].sort((x, y) => y[1] - x[1]);
  const topKey = sorted[0][0];
  const fallbacks = { A: '二次猿', B: '棉花糖', C: '高奢挂件', D: '尖叫鸡' };
  return fallbacks[topKey];
}

/* ─────────────────── MAIN APP ─────────────────── */
function App() {
  const [phase, setPhase] = useState('start'); // 'start' | 'quiz' | 'result'
  const [currentIndex, setCurrentIndex] = useState(0);
  const [answers, setAnswers] = useState([]); // array of 'A'|'B'|'C'|'D'
  const [selectedKey, setSelectedKey] = useState(null);
  const [animClass, setAnimClass] = useState('fade-active');
  const [resultKey, setResultKey] = useState(null);

  const counts = { A: 0, B: 0, C: 0, D: 0 };
  answers.forEach(k => { counts[k]++; });

  function transition(cb) {
    setAnimClass('fade-exit');
    setTimeout(() => {
      cb();
      setAnimClass('fade-enter');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => setAnimClass('fade-active'));
      });
    }, 220);
  }

  function handleStart() {
    transition(() => {
      setPhase('quiz');
      setCurrentIndex(0);
      setAnswers([]);
      setSelectedKey(null);
    });
  }

  function handleAnswer(key) {
    if (selectedKey !== null) return; // prevent double-click
    setSelectedKey(key);

    setTimeout(() => {
      const newAnswers = [...answers, key];
      if (currentIndex + 1 >= QUESTIONS.length) {
        // Done
        const finalCounts = { A: 0, B: 0, C: 0, D: 0 };
        newAnswers.forEach(k => { finalCounts[k]++; });
        const res = calcResult(finalCounts);
        transition(() => {
          setAnswers(newAnswers);
          setResultKey(res);
          setPhase('result');
          setSelectedKey(null);
        });
      } else {
        transition(() => {
          setAnswers(newAnswers);
          setCurrentIndex(currentIndex + 1);
          setSelectedKey(null);
        });
      }
    }, 400);
  }

  function handleRestart() {
    transition(() => {
      setPhase('start');
      setCurrentIndex(0);
      setAnswers([]);
      setSelectedKey(null);
      setResultKey(null);
    });
  }

  return (
    <div className={animClass} style={{ minHeight: '100vh' }}>
      {phase === 'start' && <StartPage onStart={handleStart} />}
      {phase === 'quiz' && (
        <QuestionPage
          question={QUESTIONS[currentIndex]}
          questionIndex={currentIndex}
          total={QUESTIONS.length}
          onAnswer={handleAnswer}
          selectedKey={selectedKey}
        />
      )}
      {phase === 'result' && (
        <ResultPage
          counts={counts}
          resultKey={resultKey}
          onRestart={handleRestart}
        />
      )}
    </div>
  );
}
